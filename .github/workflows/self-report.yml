name: Self Report

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install git-who
        run: pip install -e .

      - name: Health Report
        run: git-who health

      - name: Bus Factor
        run: git-who bus-factor

      - name: Hotspots
        run: git-who hotspots
