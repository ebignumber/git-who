name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what you expected vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1. Run `git-who <command>` in a git repository
        2. ...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / error message
      description: Paste the full output or error traceback.
      render: shell
  - type: input
    id: version
    attributes:
      label: git-who version
      description: Output of `git-who --version` or `pip show git-who`
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS 14, Ubuntu 22.04, Windows 11
