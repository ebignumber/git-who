name: 'git-who'
description: 'Analyze code expertise, bus factor, and hotspots from git history'
author: 'trinarymage'

branding:
  icon: 'users'
  color: 'blue'

inputs:
  command:
    description: 'Command to run: overview, bus-factor, hotspots, dirs, review, codeowners'
    required: false
    default: 'overview'
  format:
    description: 'Output format: terminal, json, markdown'
    required: false
    default: 'markdown'
  since:
    description: 'Only consider commits after this date (e.g., "6 months ago")'
    required: false
    default: ''
  ignore:
    description: 'Comma-separated glob patterns to ignore (e.g., "vendor/*,*.min.js")'
    required: false
    default: ''
  min-commits:
    description: 'Minimum commits for hotspot detection'
    required: false
    default: '3'
  base:
    description: 'Base branch for reviewer suggestions'
    required: false
    default: 'main'
  post-comment:
    description: 'Post results as a PR comment (requires github-token)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ''
  fail-on-bus-factor:
    description: 'Fail the check if repo bus factor is below this threshold (0 to disable)'
    required: false
    default: '0'

outputs:
  bus-factor:
    description: 'Repository-wide bus factor'
  hotspot-count:
    description: 'Number of hotspots detected'
  report:
    description: 'Full report output'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install git-who
      shell: bash
      run: pip install git-who

    - name: Run git-who
      id: gitwho
      shell: bash
      run: |
        set -e

        # Build command
        CMD="git-who"
        SUBCMD="${{ inputs.command }}"
        FORMAT="${{ inputs.format }}"
        SINCE="${{ inputs.since }}"
        IGNORE="${{ inputs.ignore }}"

        # Add format flag
        if [ "$FORMAT" = "json" ]; then
          CMD="$CMD --json"
        elif [ "$FORMAT" = "markdown" ]; then
          CMD="$CMD --markdown"
        fi

        # Add since flag
        if [ -n "$SINCE" ]; then
          CMD="$CMD --since \"$SINCE\""
        fi

        # Add ignore patterns
        if [ -n "$IGNORE" ]; then
          IFS=',' read -ra PATTERNS <<< "$IGNORE"
          for pat in "${PATTERNS[@]}"; do
            CMD="$CMD --ignore \"$(echo $pat | xargs)\""
          done
        fi

        # Add subcommand
        if [ "$SUBCMD" != "overview" ]; then
          CMD="$CMD $SUBCMD"
        fi

        # Add subcommand-specific options
        if [ "$SUBCMD" = "hotspots" ]; then
          CMD="$CMD --min-commits ${{ inputs.min-commits }}"
        elif [ "$SUBCMD" = "review" ]; then
          CMD="$CMD --base ${{ inputs.base }}"
        fi

        # Run and capture output
        echo "Running: $CMD"
        REPORT=$(eval $CMD)
        echo "$REPORT"

        # Save report to file for PR comment
        echo "$REPORT" > /tmp/git-who-report.txt

        # Set output
        {
          echo "report<<GITWHO_EOF"
          echo "$REPORT"
          echo "GITWHO_EOF"
        } >> "$GITHUB_OUTPUT"

        # Get bus factor and hotspot count via JSON
        BUS_FACTOR=$(git-who --json | python3 -c "import sys, json; print(json.load(sys.stdin)['bus_factor'])")
        echo "bus-factor=$BUS_FACTOR" >> "$GITHUB_OUTPUT"

        HOTSPOTS=$(git-who hotspots --json | python3 -c "import sys, json; print(len(json.load(sys.stdin)['hotspots']))")
        echo "hotspot-count=$HOTSPOTS" >> "$GITHUB_OUTPUT"

        # Check bus factor threshold
        THRESHOLD="${{ inputs.fail-on-bus-factor }}"
        if [ "$THRESHOLD" -gt 0 ] 2>/dev/null; then
          if [ "$BUS_FACTOR" -lt "$THRESHOLD" ]; then
            echo "::error::Repository bus factor ($BUS_FACTOR) is below threshold ($THRESHOLD)"
            exit 1
          fi
        fi

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        if [ -z "$GH_TOKEN" ]; then
          echo "::warning::github-token is required to post PR comments"
          exit 0
        fi

        # Add header to report
        {
          echo "## 🔍 git-who Report"
          echo ""
          cat /tmp/git-who-report.txt
          echo ""
          echo "---"
          echo "*Generated by [git-who](https://github.com/trinarymage/git-who)*"
        } > /tmp/git-who-comment.md

        gh pr comment ${{ github.event.pull_request.number }} \
          --repo ${{ github.repository }} \
          --body-file /tmp/git-who-comment.md
